apply plugin: 'java-library'
apply plugin: 'maven-publish'

group = 'co.tinode'
version = rootProject.ext.version_name

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
    withSourcesJar()
}

sourceSets {
    main {
        java {
            // Reuse the SDK sources from the Android module.
            srcDirs = ['../tinodesdk/src/main/java']
        }
    }
}

dependencies {
    api 'com.fasterxml.jackson.core:jackson-databind:2.21.1'
    api 'com.fasterxml.jackson.core:jackson-core:2.21.1'
    api 'com.fasterxml.jackson.core:jackson-annotations:2.21'

    api 'org.java-websocket:Java-WebSocket:1.5.7'
    implementation 'com.ibm.icu:icu4j:78.2'
    implementation 'org.jetbrains:annotations:26.1.0'
    implementation 'org.json:json:20250517'

    testImplementation 'junit:junit:4.13.2'
}

tasks.named('jar') {
    manifest {
        attributes(
                'Implementation-Title': 'Tinode SDK (JVM)',
                'Implementation-Version': project.version
        )
    }
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
            artifactId = 'tinodesdk-jvm'
        }
    }
}
